<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enterprise Risk Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Enterprise Risk Dashboard</h1>
      <p>Risk overview, scoring, and mitigation tracking</p>
    </header>

    <section class="cards">
      <div class="card">
        <h3>Total Risks</h3>
        <p id="totalRisks">0</p>
      </div>
      <div class="card">
        <h3>Highest Risk Score</h3>
        <p id="highestRisk">0</p>
      </div>
      <div class="card">
        <h3>Mitigation Actions</h3>
        <p id="totalActions">0</p>
      </div>
    </section>

    <section class="panel">
      <h2>Risk Scores</h2>
      <canvas id="riskChart"></canvas>
    </section>

    <section class="panel">
      <h2>Top Risks</h2>
      <table id="riskTable">
        <thead>
          <tr>
            <th>Risk</th>
            <th>Impact</th>
            <th>Probability</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
